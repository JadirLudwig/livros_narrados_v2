<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros Narrados fastGPU — Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0d0d15;
            --glass-bg: rgba(26, 26, 38, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --gradient-main: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding: 3rem 1rem;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 40%);
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 3.5rem; }
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }
        .header p { color: var(--text-secondary); font-size: 1.1rem; font-weight: 300; letter-spacing: 0.05em; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            padding: 3.5rem;
            border-radius: 24px;
            cursor: pointer;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 2rem;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.1);
            transform: scale(1.01);
        }
        .drop-zone strong { color: var(--accent-primary); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .full-width { grid-column: 1 / -1; }

        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.6rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
        input[type="text"], select {
            width: 100%; height: 56px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: var(--text-primary); padding: 0 1.2rem; border-radius: 16px; font-size: 1rem;
            transition: all 0.3s; font-family: 'Outfit', sans-serif;
        }
        input:focus, select:focus { border-color: var(--accent-primary); outline: none; background: rgba(0,0,0,0.5); }

        .btn {
            width: 100%; height: 64px; background: var(--gradient-main); color: white; border: none;
            border-radius: 18px; font-weight: 700; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:hover { transform: translateY(-4px) scale(1.02); box-shadow: var(--shadow-glow); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .btn-outline { background: transparent; border: 2px solid var(--glass-border); color: var(--text-secondary); height: 48px; border-radius: 14px; font-size: 0.9rem; margin-top: 1rem; }
        .btn-outline:hover { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.05); }

        /* STATUS & LOGS */
        .status-container { display: none; }
        .status-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1rem; }
        .status-title { font-size: 1.5rem; font-weight: 700; background: var(--gradient-main); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .status-percent { font-size: 2rem; font-weight: 800; font-family: 'Space Grotesk'; }
        
        .progress-track { height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; margin-bottom: 1.5rem; border: 1px solid var(--glass-border); }
        .progress-fill { height: 100%; background: var(--gradient-main); width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .progress-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shine 2s infinite; }

        @keyframes shine { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        .log-box {
            background: rgba(0,0,0,0.4); border-radius: 18px; padding: 1.2rem; border: 1px solid var(--glass-border);
            height: 180px; overflow-y: auto; font-family: 'Space Grotesk', monospace; font-size: 0.85rem; line-height: 1.6;
        }
        .log-line { display: flex; gap: 12px; margin-bottom: 6px; opacity: 0; animation: fadeIn 0.3s forwards; }
        .log-time { color: var(--text-muted); font-weight: 500; min-width: 70px; }
        .log-msg { color: var(--text-secondary); }
        .log-msg.highlight { color: var(--accent-primary); font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .preview-pane { margin-top: 2rem; border-radius: 24px; overflow: hidden; border: 1px solid var(--accent-primary); display: none; }
        video { width: 100%; display: block; background: #000; }
        .audio-wrapper { padding: 1.5rem; background: var(--bg-secondary); }
        audio { width: 100%; filter: invert(0.9); height: 40px; }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }

        #final-screen { text-align: center; }
        .success-icon { font-size: 5rem; color: var(--success); margin-bottom: 1.5rem; display: block; }

        .gpu-badge {
            display: inline-flex; align-items: center; gap: 6px; background: rgba(16, 185, 129, 0.1);
            color: var(--success); padding: 6px 12px; border-radius: 100px; font-size: 0.7rem;
            font-weight: 600; text-transform: uppercase; margin-bottom: 1.5rem; border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="gpu-badge">⚡ NVIDIA GPU Accelerated — CUDA 12.1</div>
            <h1>Livros Narrados fastGPU</h1>
            <p>Transformação Cinematográfica de Audiolivros</p>
        </div>

        <div class="glass-card" id="form-card">
            <form id="main-form">
                <div class="drop-zone" id="drop-zone">
                    <label for="pdf-file" style="cursor: pointer;">
                        <span style="font-size: 3rem; display: block; margin-bottom: 1rem;">📄</span>
                        Arraste o livro aqui ou <strong>Clique para Explorar</strong>
                    </label>
                    <input type="file" id="pdf-file" accept=".pdf,.epub" style="display: none;">
                </div>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Título da Obra</label>
                        <input type="text" id="form-title" placeholder="Ex: Grande Sertão: Veredas">
                    </div>
                    <div class="input-group">
                        <label>Autor / Voz</label>
                        <select id="form-voice">
                            <option value="pm_alex">♂️ Alex (Voz Profunda)</option>
                            <option value="pf_dora" selected>♀️ Dora (Voz Padrão BR)</option>
                            <option value="pm_santa">♂️ Santa (Voz Narrativa)</option>
                        </select>
                    </div>
                    <div class="input-group full-width">
                        <label>Capa Customizada (Opcional)</label>
                        <input type="file" id="form-cover" accept="image/*" style="padding: 12px; border: 1px dashed var(--glass-border); border-radius: 12px; width: 100%;">
                    </div>
                </div>

                <button type="button" id="btn-generate" class="btn" style="margin-top: 2rem;">
                    🚀 INICIAR PIPELINE GPU
                </button>
            </form>
            <button id="btn-cleanup" class="btn btn-outline">🗑️ LIMPAR SERVIDOR</button>
        </div>

        <div class="glass-card status-container" id="status-card">
            <div class="status-header">
                <div>
                    <span class="status-title" id="proc-state">INICIALIZANDO</span>
                    <p id="curr-action" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px;">Preparando motores...</p>
                </div>
                <div class="status-percent" id="proc-pct">0%</div>
            </div>

            <div class="progress-track">
                <div class="progress-fill" id="pb-fill"></div>
            </div>

            <div class="log-box" id="terminal">
                <div class="log-line"><span class="log-time">[--:--:--]</span> <span class="log-msg">Aguardando comando...</span></div>
            </div>

            <div class="preview-pane" id="preview-area">
                <div class="audio-wrapper">
                    <p style="font-size: 0.8rem; margin-bottom: 10px; font-weight: 600; color: var(--accent-primary);">🎧 AMOSTRA DE VOZ GERADA:</p>
                    <audio id="audio-out" controls></audio>
                </div>
                <video id="video-out" controls style="display: none;"></video>
            </div>

            <div class="action-row" id="final-actions" style="display: none;">
                <button class="btn btn-outline" id="btn-tweak" style="margin: 0;">⚙️ AJUSTAR CONFIGS</button>
                <button class="btn" id="btn-full">🎯 NARRAR LIVRO TODO</button>
            </div>
        </div>

        <div class="glass-card" id="success-screen" style="display: none;">
            <span class="success-icon">✨</span>
            <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Missão Cumprida!</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Seu audiolivro foi processado via GPU e está pronto.</p>
            <button class="btn" onclick="location.reload()">NOVA JORNADA</button>
        </div>
    </div>

    <script>
        let tid = null;
        const terminal = document.getElementById('terminal');
        const fill = document.getElementById('pb-fill');
        const pct = document.getElementById('proc-pct');
        const stateStr = document.getElementById('proc-state');
        const actionStr = document.getElementById('curr-action');

        function addLog(text, highlight = false) {
            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false });
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-msg ${highlight ? 'highlight' : ''}">${text}</span>`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        document.getElementById('btn-generate').onclick = async () => {
            const file = document.getElementById('pdf-file').files[0];
            if(!file) { alert("Selecione um arquivo PDF primeiro!"); return; }

            const fd = new FormData();
            fd.append('file', file);
            fd.append('title', document.getElementById('form-title').value);
            fd.append('voice', document.getElementById('form-voice').value);
            const cover = document.getElementById('form-cover').files[0];
            if(cover) fd.append('cover', cover);

            document.getElementById('form-card').style.display = 'none';
            document.getElementById('status-card').style.display = 'block';
            addLog("🚀 Enviando pipeline para a GTX 1060...", true);

            const res = await fetch('/api/process_book', { method: 'POST', body: fd });
            const data = await res.json();
            if(data.error) { alert(data.error); location.reload(); return; }
            tid = data.task_id;
            startPolling();
        };

        function startPolling() {
            const interval = setInterval(async () => {
                const res = await fetch(`/api/status/${tid}`);
                if(!res.ok) return;
                const d = await res.json();

                stateStr.innerText = d.status;
                actionStr.innerText = d.message || "Processando...";
                if(d.message) addLog(d.message);

                let p = 0;
                if(d.status === 'PROGRESS') {
                    if(d.message.includes('Lendo')) p = 15;
                    else if(d.message.includes('Limpando')) p = 30;
                    else if(d.message.includes('Sinteti')) p = 50;
                    else if(d.message.includes('Lote')) p = 60 + (Math.random() * 20);
                }
                
                if(d.status === 'SAMPLE_READY') {
                    p = 100;
                    clearInterval(interval);
                    addLog("✅ AMOSTRA DE 5 MINUTOS FINALIZADA!", true);
                    document.getElementById('preview-area').style.display = 'block';
                    document.getElementById('audio-out').src = d.sample_audio_url + "?t=" + Date.now();
                    document.getElementById('final-actions').style.display = 'grid';
                }

                if(d.status === 'SUCCESS') {
                    p = 100;
                    clearInterval(interval);
                    document.getElementById('status-card').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'block';
                }

                fill.style.width = p + '%';
                pct.innerText = Math.round(p) + '%';

            }, 2000);
        }

        document.getElementById('btn-full').onclick = async () => {
            document.getElementById('final-actions').style.display = 'none';
            addLog("🎯 Iniciando processamento completo via CUDA...", true);
            const res = await fetch('/api/continue_process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ task_id: tid })
            });
            const d = await res.json();
            tid = d.task_id;
            startPolling();
        };

        // File Selection UI
        document.getElementById('pdf-file').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                document.querySelector('.drop-zone label strong').innerText = f.name;
                if(!document.getElementById('form-title').value) document.getElementById('form-title').value = f.name.split('.')[0];
            }
        };

        document.getElementById('btn-cleanup').onclick = async () => {
            if(confirm("Deseja deletar todos os arquivos temporários?")) {
                await fetch('/api/cleanup_all', { method: 'POST' });
                location.reload();
            }
        }
    </script>
</body>
</html>
