<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livros Narrados V3.1 — Pipeline de Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --gradient-main: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --gradient-card: linear-gradient(145deg, #1a1a24 0%, #12121a 100%);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 720px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .card {
            background: var(--gradient-card);
            border-radius: 24px;
            padding: 1.75rem;
            margin-bottom: 1.25rem;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
        }

        .drop-zone {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            padding: 2.5rem;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            background: rgba(99, 102, 241, 0.03);
            transition: all 0.3s ease;
            display: block;
        }
        .drop-zone:hover { border-color: var(--accent-primary); background: rgba(99, 102, 241, 0.08); }
        .drop-zone input { display: none; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .full-width { grid-column: 1 / -1; }

        label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; font-weight: 500; }
        input[type="text"], select {
            width: 100%; background: var(--bg-secondary); border: 1px solid var(--border-subtle);
            color: var(--text-primary); padding: 0.8rem 1rem; border-radius: 12px; font-size: 0.95rem;
        }

        .btn {
            width: 100%; background: var(--gradient-main); color: white; border: none;
            padding: 1.1rem; border-radius: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; font-size: 1.05rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-outline { background: transparent; border: 1px solid var(--accent-primary); color: var(--accent-primary); }
        .btn-danger { background: var(--danger); }

        /* STATUS AREA */
        .status-area {
            display: none; margin-top: 1.5rem; padding: 1.5rem;
            background: var(--bg-card); border-radius: 20px; border: 1px solid var(--accent-primary);
        }
        .status-area.visible { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .progress-container { margin: 1rem 0; }
        .progress-bar { height: 10px; background: #000; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gradient-main); width: 0%; transition: width 0.4s ease; }

        /* LOG CONSOLE */
        .log-console {
            margin-top: 1rem; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem; padding: 10px; border-radius: 8px; height: 120px; overflow-y: auto;
            border: 1px solid #333; line-height: 1.4;
        }
        .log-line { margin-bottom: 2px; }
        .log-timestamp { color: #888; margin-right: 8px; }
        .drop-zone {
            border: 2px dashed #444; border-radius: 12px; padding: 2rem; text-align: center;
            cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.02); margin-bottom: 1.5rem;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent-primary); background: rgba(139, 92, 246, 0.05); }

        .voice-card { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        
        .success-badge {
            background: #059669; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
            display: inline-flex; align-items: center; gap: 5px; margin-top: 10px;
        }
        .sample-preview {
            display: none; margin-top: 1.5rem; text-align: center;
            background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--accent-primary);
        }
        .sample-preview.visible { display: block; }
        video { width: 100%; max-height: 400px; display: block; }

        .action-gate {
            display: none; margin-top: 1.5rem; gap: 1rem; grid-template-columns: 1fr 1fr;
        }
        .action-gate.visible { display: grid; }

        .yt-badge {
            background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }

        .version { text-align: center; color: var(--text-muted); font-size: 0.75rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Livros Narrados V3.4</h1>
            <p>Performance Extrema & Vozes Naturais</p>
        </div>

        <div class="card" id="config-card">
            <form id="book-form">
                <div class="drop-zone" id="drop-zone">
                    <label for="pdf-input" id="file-label" style="cursor: pointer;">
                        📁 Arraste o PDF aqui ou <strong>Clique para Escolher</strong>
                    </label>
                    <input type="file" id="pdf-input" accept=".pdf,.epub" style="display: none;">
                </div>

                <div class="form-grid" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Título</label>
                        <input type="text" id="title" placeholder="Nome do Livro">
                    </div>
                    <div class="form-group">
                        <label>Autor</label>
                        <input type="text" id="author" placeholder="Autor">
                    </div>
                    <div class="field-group">
                        <label>Voz Narradora (PT-BR Premiums):</label>
                        <select id="voice" class="input">
                            <option value="pm_alex">♂️ Alex (Masculino - Natural)</option>
                            <option value="pf_dora">♀️ Dora (Feminino - Padrão)</option>
                            <option value="pm_santa">♂️ Santa (Masculino - Robusto)</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Capa Customizada (Opcional)</label>
                        <input type="file" id="cover-input" accept="image/*" style="display: block; border: 1px dashed #555; padding: 10px; border-radius: 8px;">
                    </div>
                </div>

                <button type="button" id="start-btn" class="btn" style="margin-top: 1.5rem;">🚀 Gerar Amostra de 5 Minutos</button>
                <button type="button" id="cleanup-btn" class="btn btn-outline" style="margin-top: 0.5rem; color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.05); font-size: 0.85rem; padding: 0.6rem;">🗑️ Limpar Pasta de Uploads/Outputs</button>
            </form>
        </div>

        <div class="status-area" id="status-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="status-msg" style="font-weight: 600; color: var(--accent-primary);">Iniciando...</span>
                <span id="status-pct">0%</span>
            </div>
            <div class="progress-container">
            <div class="progress-container">
                <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            </div>
            <p id="status-detail" style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;"></p>
            
            <div class="log-console" id="log-console">
                <div class="log-line"><span class="log-timestamp">[--:--:--]</span> Sistema aguardando pedido...</div>
            </div>

            <div class="sample-preview" id="sample-area">
                <p style="padding: 10px; font-size: 0.9rem; font-weight: 600;">🎧 Ouvir Amostra de Voz (Primeiros 5 min)</p>
                <audio id="audio-player" controls style="width: 100%; margin: 10px 0;"></audio>
                <video id="player" controls style="display: none;"></video>
            </div>

            <div class="action-gate" id="gate">
                <button class="btn btn-outline" id="refactor-btn">🛠️ Ajustar Voz/Dados</button>
                <button class="btn" id="continue-btn">🎯 Continuar até o Fim</button>
            </div>
        </div>

        <div id="final-result" class="card" style="display: none; text-align: center; border-color: var(--success);">
            <h2 style="color: var(--success);">🎉 Tudo Pronto!</h2>
            <p style="margin-bottom: 1.5rem;">O livro foi processado e enviado para o YouTube.</p>
            <button class="btn btn-outline" onclick="location.reload()">🔄 Processar Outro Livro</button>
        </div>

        <div class="version">
            Pipeline 3.0 Pro Ultimate — Keep PDF Active — Bitrate 1000k
        </div>
    </div>

    <script>
        let currentTaskId = null;
        const fill = document.getElementById('fill');
        const msg = document.getElementById('status-msg');
        const pct = document.getElementById('status-pct');
        const detail = document.getElementById('status-detail');
        const container = document.getElementById('status-container');
        const gate = document.getElementById('gate');
        const sampleArea = document.getElementById('sample-area');
        const player = document.getElementById('player');

        document.getElementById('start-btn').onclick = async () => {
            const file = document.getElementById('pdf-input').files[0];
            const fd = new FormData();
            if (file) fd.append('file', file);
            fd.append('title', document.getElementById('title').value);
            fd.append('author', document.getElementById('author').value);
            fd.append('voice', document.getElementById('voice').value);
            if (currentTaskId) fd.append('reuse_id', currentTaskId);
            
            const cover = document.getElementById('cover-input').files[0];
            if(cover) fd.append('cover', cover);

            document.getElementById('config-card').style.display = 'none';
            container.classList.add('visible');
            addLog("🚀 Enviando solicitação ao servidor...");

            const res = await fetch('/api/process_book', { method: 'POST', body: fd });
            const data = await res.json();
            if(data.error) {
                alert(data.error);
                location.reload();
                return;
            }
            currentTaskId = data.task_id;
            poll();
        };

        document.getElementById('refactor-btn').onclick = async () => {
            if(!confirm("Deseja alterar as configurações? O PDF será mantido.")) return;
            
            // Reset UI but keep taskId
            gate.classList.remove('visible');
            sampleArea.classList.remove('visible');
            container.classList.remove('visible');
            document.getElementById('config-card').style.display = 'block';
            addLog("📝 Alterando configurações...");
            
            await fetch('/api/refactor_process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ task_id: currentTaskId })
            });
        };

        async function poll() {
            const timer = setInterval(async () => {
                const res = await fetch(`/api/status/${currentTaskId}`);
                if (!res.ok) {
                    addLog("⚠️ Servidor ocupado ou falhando (tentando novamente...)");
                    return;
                }
                const data = await res.json();

                msg.innerText = data.status;
                const currentMsg = data.message || "...";
                detail.innerText = currentMsg;

                if (data.status === 'PROGRESS') {
                    addLog(currentMsg);
                    
                    // Lógica visual de progresso baseada em marcos
                    let p = 5;
                    if(currentMsg.includes('Lendo página')) p = 15;
                    if(currentMsg.includes('Limpando')) p = 35;
                    if(currentMsg.includes('Gerando')) p = 45;
                    if(currentMsg.includes('Sinteti')) p = 60;
                    if(currentMsg.includes('Compondo')) p = 85;
                    if(currentMsg.includes('Lote')) p = 50 + (Math.random() * 40); 
                    
                    fill.style.width = p + '%';
                    pct.innerText = Math.round(p) + '%';
                }

                if(data.status === 'SAMPLE_READY') {
                    fill.style.width = '100%';
                    pct.innerText = '100%';
                    msg.innerText = "AMOSTRA PRONTA";
                    sampleArea.classList.add('visible');
                    
                    if (data.sample_audio_url) {
                        const audioPlayer = document.getElementById('audio-player');
                        audioPlayer.src = data.sample_audio_url + "?t=" + Date.now();
                        audioPlayer.style.display = 'block';
                    }
                    
                    gate.classList.add('visible');
                    clearInterval(timer);
                }

                if(data.status === 'SUCCESS') {
                    clearInterval(timer);
                    container.style.display = 'none';
                    document.getElementById('final-result').style.display = 'block';
                    if (data.youtube_url) {
                        document.getElementById('yt-status').innerText = "✅ Publicado no YouTube!";
                        document.getElementById('yt-status').style.display = 'inline-flex';
                    } else {
                        document.getElementById('yt-status').style.display = 'none';
                    }
                }

                if(data.status === 'FAILURE') {
                    alert("Erro: " + data.message);
                    clearInterval(timer);
                    location.reload();
                }
            }, 2000);
        }

        document.getElementById('continue-btn').onclick = async () => {
            gate.classList.remove('visible');
            msg.innerText = "PROCESSANDO RESTANTE...";
            const res = await fetch('/api/continue_process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ task_id: currentTaskId })
            });
            const data = await res.json();
            currentTaskId = data.task_id; // Atualiza para o ID da fask de continuação
            poll();
        };

        document.getElementById('refactor-btn').onclick = async () => {
            if(!confirm("Isso vai apagar a amostra e permitir mudar a voz/título. O PDF será mantido. Continuar?")) return;
            await fetch('/api/refactor_process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ task_id: currentTaskId })
            });
            location.reload();
        };

        function addLog(text) {
            const console = document.getElementById('log-console');
            const lastLine = console.lastElementChild;
            if (lastLine && lastLine.innerText.includes(text)) return; // Evita duplicados seguidos

            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false });
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-timestamp">[${time}]</span> ${text}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        // Drag & Drop Logic
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('pdf-input');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length) {
                fileInput.files = files;
                updateFileUI(files[0]);
            }
        });

        fileInput.onchange = (e) => {
            if(e.target.files.length) updateFileUI(e.target.files[0]);
        };

        function updateFileUI(file) {
            document.getElementById('file-label').innerHTML = `✅ <strong>${file.name}</strong> selecionado`;
            const titleInput = document.getElementById('title');
            if(!titleInput.value) titleInput.value = file.name.split('.')[0];
        }

        document.getElementById('cleanup-btn').onclick = async () => {
            if(!confirm("Tem certeza que deseja apagar todos os arquivos e pastas de UPLOADS e OUTPUTS? Isso não pode ser desfeito.")) return;
            
            try {
                const res = await fetch('/api/cleanup_all', { method: 'POST' });
                const data = await res.json();
                if(data.success) {
                    addLog("✨ Limpeza concluída com sucesso!");
                    alert("Pastas limpas!");
                    location.reload();
                } else {
                    alert("Erro ao limpar: " + data.error);
                }
            } catch(e) {
                alert("Erro na conexão: " + e);
            }
        };
    </script>
</body>
</html>
